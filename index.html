<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>化妆品原料英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f5f7;color:#1c1c1e;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.page{max-width:420px;margin:0 auto;padding:20px 16px 32px;min-height:100vh}

/* 进度 */
.prog-sec{margin-bottom:20px}
.prog-info{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-info span{font-size:13px;color:#8e8e93}
.prog-info .pct{color:#4f46e5;font-weight:600}
.prog-track{height:3px;background:#e5e5ea;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#4f46e5;border-radius:2px;transition:width .35s}

/* 分类 */
.cats{overflow-x:auto;white-space:nowrap;margin-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cats .c{display:inline-block;padding:7px 16px;font-size:13px;color:#6b7280;background:#fff;border:1px solid #e5e7eb;border-radius:18px;margin-right:8px;cursor:pointer;transition:.2s}
.cats .c.on{background:#4f46e5;color:#fff;border-color:#4f46e5;font-weight:500}

/* 卡片 */
.card-area{width:100%;height:280px;margin-bottom:20px;perspective:800px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s ease}
.card.flipped{transform:rotateY(180deg)}
.card-f,.card-b{position:absolute;width:100%;height:100%;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:32px 24px}
.card-f{background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.card-b{background:#4f46e5;transform:rotateY(180deg);box-shadow:0 2px 16px rgba(79,70,229,.25)}
.seq{position:absolute;top:14px;right:18px;font-size:12px;color:#c7c7cc;font-variant-numeric:tabular-nums}
.seq.lt{color:rgba(255,255,255,.4)}
.en{font-size:22px;font-weight:600;color:#1c1c1e;text-align:center;line-height:1.35}
.zh{font-size:22px;font-weight:600;color:#fff;text-align:center;line-height:1.35}
.hint{margin-top:14px;font-size:12px;color:#c7c7cc}
.cat-tag{margin-top:12px;padding:4px 14px;background:rgba(255,255,255,.18);border-radius:12px;font-size:12px;color:rgba(255,255,255,.8)}
.spk{position:absolute;bottom:16px;left:18px;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:14px;background:rgba(0,0,0,.04);cursor:pointer;border:none;font-size:12px;color:#8e8e93}
.card-b .spk{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.spk .dot{width:8px;height:8px;border-radius:50%;background:#4f46e5;flex-shrink:0}
.card-b .spk .dot{background:rgba(255,255,255,.7)}
.spk.playing .dot{background:#22c55e;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 完成 */
.done-card{width:100%;height:280px;border-radius:16px;background:#fff;box-shadow:0 2px 16px rgba(0,0,0,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px}
.done-card h2{font-size:20px;font-weight:600}
.done-card p{font-size:13px;color:#8e8e93;margin:8px 0 20px}
.done-card button{padding:10px 32px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer}

/* 操作 */
.acts{display:flex;gap:10px;margin-bottom:16px}
.acts button{flex:1;padding:14px 0;border-radius:12px;font-size:15px;font-weight:500;border:none;cursor:pointer}
.acts .main{background:#4f46e5;color:#fff}
.acts .sub{background:#fff;color:#3c3c43;border:1px solid #e5e7eb}

/* 工具栏 */
.toolbar{display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.toolbar span{flex:1;text-align:center;font-size:13px;color:#8e8e93;padding:10px 0;cursor:pointer}
.toolbar span.on{color:#4f46e5;font-weight:500}
.toolbar .sep{width:1px;height:16px;background:#e5e5ea;flex:none}

.speed{display:flex;align-items:center;padding:0 4px}
.speed label{font-size:12px;color:#8e8e93;flex-shrink:0}
.speed input[type=range]{flex:1;margin:0 8px;accent-color:#4f46e5}
.speed .val{font-size:12px;color:#4f46e5;font-weight:600;width:36px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div class="page">
  <div class="prog-sec">
    <div class="prog-info"><span id="progText"></span><span class="pct" id="progPct"></span></div>
    <div class="prog-track"><div class="prog-fill" id="progBar"></div></div>
  </div>
  <div class="cats" id="cats"></div>
  <div id="cardArea"></div>
  <audio id="ttsAudio" preload="auto" style="display:none"></audio>
  <div class="acts" id="acts"></div>
  <div class="toolbar">
    <span id="btnShuffle" onclick="doShuffle()">打乱</span>
    <div class="sep"></div>
    <span id="btnReset" onclick="doReset()">重置</span>
    <div class="sep"></div>
    <span id="btnAuto" onclick="toggleAuto()">自动朗读</span>
  </div>
  <div class="speed">
    <label>语速</label>
    <input type="range" min="5" max="15" value="8" id="spdSlider" oninput="onSpd(this.value)">
    <span class="val" id="spdVal">0.8x</span>
  </div>
</div>

gory":"维生素"},{"en":"Vitamin K","zh":"维生素K","category":"维生素"},{"en":"Wax Esters","zh":"蜡酯","category":"蜡类"},{"en":"Wheat Germ Oil","zh":"小麦胚芽油","category":"天然油脂"},{"en":"Wheat Protein","zh":"小麦蛋白","category":"蛋白质"},{"en":"White Lily Extract","zh":"百合萃取","category":"植物萃取"},{"en":"Wild Yam Extract","zh":"山药萃取","category":"植物萃取"},{"en":"Witch Hazel Extract","zh":"金缕梅萃取","category":"植物萃取"},{"en":"Wool Fat","zh":"羊毛脂","category":"润肤剂"},{"en":"Yarrow Extract","zh":"蓍草萃取","category":"植物萃取"},{"en":"Yeast Extract","zh":"酵母萃取","category":"活性成分"},{"en":"Ylang-Ylang Essential Oil","zh":"依兰精油","category":"精油"},{"en":"Yogurt","zh":"优格/酸奶","category":"活性成分"},{"en":"Zinc Oxide","zh":"氧化锌","category":"防晒剂"},{"en":"Surfactant","zh":"表面活性剂","category":"表面活性剂"},{"en":"Emulsifier","zh":"乳化剂","category":"乳化剂"},{"en":"Emulsion","zh":"乳液/乳剂","category":"剂型"},{"en":"Anionic Surfactant","zh":"阴离子表面活性剂","category":"表面活性剂"},{"en":"Nonionic Surfactant","zh":"非离子表面活性剂","category":"表面活性剂"},{"en":"Cationic Surfactant","zh":"阳离子表面活性剂","category":"表面活性剂"},{"en":"Alkyl Poly Glycoside (APG)","zh":"烷基多苷","category":"表面活性剂"},{"en":"Linear Alkyl Benzene Sulphonate (LAS)","zh":"直链烷基苯磺酸盐","category":"表面活性剂"},{"en":"Alkyl Sulfate","zh":"烷基硫酸盐","category":"表面活性剂"},{"en":"Sodium Lauryl Sulfate (SLS)","zh":"月桂基硫酸钠","category":"表面活性剂"},{"en":"Fatty Acid Methyl Ester Sulphonate","zh":"脂肪酸甲酯磺酸盐","category":"表面活性剂"},{"en":"Fatty Alcohol Polyoxyethylene Ether","zh":"脂肪醇聚氧乙烯醚","category":"表面活性剂"},{"en":"Coconut Fatty Acid Diethanolamide","zh":"椰子油脂肪酸二乙醇酰胺","category":"表面活性剂"},{"en":"Fatty Acid Monoethanol Amide","zh":"脂肪酸单乙醇酰胺","category":"表面活性剂"},{"en":"Lauramide Propyl Betaine","zh":"月桂酰胺丙基甜菜碱","category":"表面活性剂"},{"en":"Coconut Amide Betaine","zh":"椰油酰胺甜菜碱","category":"表面活性剂"},{"en":"Oil-in-Water (O/W)","zh":"水包油型","category":"剂型"},{"en":"Water-in-Oil (W/O)","zh":"油包水型","category":"剂型"},{"en":"Dispersed Phase","zh":"分散相","category":"乳化术语"},{"en":"Continuous Phase","zh":"连续相","category":"乳化术语"},{"en":"Preservative","zh":"防腐剂","category":"防腐剂"},{"en":"Humectant","zh":"保湿剂","category":"保湿剂"},{"en":"Emollient","zh":"润肤剂","category":"润肤剂"},{"en":"Active Ingredient","zh":"活性成分/有效成分","category":"通用术语"},{"en":"Cosmetic Ingredient Review (CIR)","zh":"化妆品成分评估","category":"通用术语"},{"en":"INCI (International Nomenclature of Cosmetic Ingredients)","zh":"国际化妆品原料命名","category":"通用术语"}];

var known={},deck=[],idx=0,flipped=false,filter='全部',autoSpeak=false,speed=0.8;
var tx=0,ty=0;
// 微信浏览器需要用页面内的 audio 标签才能播放
var _ttsEl=null;
var _spkBtn=null;

try{var s=localStorage.getItem('fc_known');if(s)known=JSON.parse(s)}catch(e){}

function saveKnown(){try{localStorage.setItem('fc_known',JSON.stringify(known))}catch(e){}}

function getCats(){
  var m={};DATA.forEach(function(d){m[d.category]=(m[d.category]||0)+1});
  var a=[{name:'全部',count:DATA.length}];
  Object.keys(m).sort().forEach(function(k){a.push({name:k,count:m[k]})});
  return a;
}

function renderCats(){
  var el=document.getElementById('cats');
  el.innerHTML=getCats().map(function(c){
    return '<span class="c'+(c.name===filter?' on':'')+'" onclick="pickCat(\''+c.name.replace(/'/g,"\\'")+'\')">'+c.name+'</span>';
  }).join('');
}

function pickCat(c){filter=c;buildDeck();renderCats()}

function buildDeck(){
  var pool=filter==='全部'?DATA.slice():DATA.filter(function(d){return d.category===filter});
  deck=pool.filter(function(d){return!known[d.en]});
  idx=0;flipped=false;
  updateProg(pool);renderCard();renderActs();
  if(deck.length>0&&autoSpeak)speak(deck[0].en,'en');
}

function updateProg(pool){
  if(!pool){pool=filter==='全部'?DATA:DATA.filter(function(d){return d.category===filter})}
  var total=pool.length,kn=pool.filter(function(d){return known[d.en]}).length;
  var pct=total?Math.round(kn/total*100):0;
  document.getElementById('progText').textContent='已掌握 '+kn+' / '+total;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progBar').style.width=pct+'%';
}

function renderCard(){
  var area=document.getElementById('cardArea');
  if(deck.length===0){
    area.innerHTML='<div class="done-card"><h2>全部完成</h2><p>当前分组已学完</p><button onclick="doReset()">再来一轮</button></div>';
    return;
  }
  var c=deck[idx];
  area.innerHTML='<div class="card-area" ontouchstart="ts(event)" ontouchend="te(event)">'+
    '<div class="card'+(flipped?' flipped':'')+'" onclick="flip()">'+
      '<div class="card-f"><span class="seq">'+((idx+1)+' / '+deck.length)+'</span>'+
        '<span class="en">'+esc(c.en)+'</span><span class="hint">轻触翻转</span>'+
        '<button class="spk" id="spkEn" onclick="event.stopPropagation();speakEN()"><span class="dot"></span>发音</button></div>'+
      '<div class="card-b"><span class="seq lt">'+((idx+1)+' / '+deck.length)+'</span>'+
        '<span class="zh">'+esc(c.zh)+'</span><span class="cat-tag">'+esc(c.category)+'</span>'+
        '<button class="spk" id="spkZh" onclick="event.stopPropagation();speakZH()"><span class="dot"></span>发音</button></div>'+
    '</div></div>';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderActs(){
  var el=document.getElementById('acts');
  if(deck.length===0){el.innerHTML='';return}
  el.innerHTML='<button class="sub" onclick="goPrev()">上一张</button>'+
    '<button class="main" onclick="markKnown()">已掌握</button>'+
    '<button class="sub" onclick="goNext()">下一张</button>';
}

function flip(){
  flipped=!flipped;renderCard();
  if(flipped&&autoSpeak&&deck[idx])speak(deck[idx].zh,'zh');
}

function goNext(){if(idx<deck.length-1){idx++;flipped=false;renderCard();if(autoSpeak)speak(deck[idx].en,'en')}}
function goPrev(){if(idx>0){idx--;flipped=false;renderCard();if(autoSpeak)speak(deck[idx].en,'en')}}

function markKnown(){
  if(!deck.length)return;
  known[deck[idx].en]=true;saveKnown();
  deck.splice(idx,1);
  if(idx>=deck.length)idx=Math.max(0,deck.length-1);
  flipped=false;updateProg();renderCard();renderActs();
  if(deck.length>0&&autoSpeak)speak(deck[idx].en,'en');
}

function doShuffle(){
  for(var i=deck.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deck[i];deck[i]=deck[j];deck[j]=t}
  idx=0;flipped=false;renderCard();
}

function doReset(){
  var pool=filter==='全部'?DATA:DATA.filter(function(d){return d.category===filter});
  pool.forEach(function(d){delete known[d.en]});saveKnown();
  buildDeck();
}

function toggleAuto(){
  autoSpeak=!autoSpeak;
  var el=document.getElementById('btnAuto');
  el.className=autoSpeak?'on':'';
  el.textContent='自动朗读';
}

/* === 语音（有道词典在线发音，兼容微信浏览器） === */
function speak(text,lang){
  var el=document.getElementById('ttsAudio');
  // 先停止当前播放
  el.pause();
  el.currentTime=0;

  var url;
  if(lang==='en'){
    url='https://dict.youdao.com/dictvoice?type=2&audio='+encodeURIComponent(text);
  }else{
    url='https://dict.youdao.com/dictvoice?le=zh&audio='+encodeURIComponent(text);
  }

  var btnId=lang==='en'?'spkEn':'spkZh';
  _spkBtn=document.getElementById(btnId);
  if(_spkBtn)_spkBtn.classList.add('playing');

  el.onended=el.onerror=function(){if(_spkBtn)_spkBtn.classList.remove('playing');_spkBtn=null};
  el.src=url;
  el.load();
  el.playbackRate=speed;
  // 使用 promise 兼容，静默处理错误
  var p=el.play();
  if(p&&p.catch)p.catch(function(){if(_spkBtn)_spkBtn.classList.remove('playing');_spkBtn=null});
}
function speakEN(){if(deck[idx])speak(deck[idx].en,'en')}
function speakZH(){if(deck[idx])speak(deck[idx].zh,'zh')}

// 微信浏览器需要在首次用户触摸时解锁音频
document.addEventListener('touchstart',function wxUnlock(){
  var el=document.getElementById('ttsAudio');
  el.play().then(function(){el.pause();el.currentTime=0}).catch(function(){});
  document.removeEventListener('touchstart',wxUnlock);
},{once:true});

function onSpd(v){
  speed=v/10;
  document.getElementById('spdVal').textContent=speed.toFixed(1)+'x';
}

/* === 触摸滑动 === */
function ts(e){var t=e.changedTouches[0];tx=t.clientX;ty=t.clientY}
function te(e){
  var t=e.changedTouches[0];var dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy))return;
  if(dx<0)goNext();else goPrev();
}

/* === 初始化 === */
renderCats();buildDeck();
</script>
